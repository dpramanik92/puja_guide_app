services:

  backend:
    build: ./backend
    container_name: puja-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - CHROMA_PERSIST_DIR=./chroma_db
      - SIMILARITY_THRESHOLD=0.75
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s   # ChromaDB cold-start takes ~30-40s on first request

  web:
    build: ./web
    container_name: puja-web
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
